Global:
  model_name: vietnamese_PP-OCRv5_mobile_rec
  debug: false
  use_gpu: true
  epoch_num: 50 # Từ notebook thành công
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /kaggle/working/ppocr_vnese/output/vi_ppocr_v5
  save_epoch_step: 10
  eval_batch_step: [0, 500]
  cal_metric_during_train: true
  pretrained_model: /kaggle/working/ppocr_vnese/pretrain_models/latin_PP-OCRv5_mobile_rec_pretrained.pdparams
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: /kaggle/working/ppocr_vnese/dict/vi_dict.txt
  max_text_length: &max_text_length 96 # Tăng từ 40 lên 96 như notebook
  infer_mode: false
  use_space_char: true
  distributed: true
  save_res_path: /kaggle/working/ppocr_vnese/output/rec/predicts_vi.txt
  d2s_train_image_shape: [3, 48, 640] # Tăng width từ 320 lên 640

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False

Train:
  dataset:
    name: MultiScaleDataSet
    ds_width: false
    data_dir: /kaggle/working/ppocr_vnese/data/
    ext_op_transform_idx: 1
    label_file_list:
      - /kaggle/working/ppocr_vnese/data/train_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecConAug:
          prob: 0.5
          ext_data_num: 2
          image_shape: [48, 640, 3]
          max_text_length: *max_text_length
      - RecAug:
      - MultiLabelEncode:
          max_text_length: *max_text_length
          gtc_encode: NRTRLabelEncode
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  sampler:
    name: MultiScaleSampler
    scales: [[640, 32], [640, 48], [640, 64]]
    first_bs: &bs 32
    fix_bs: false
    divided_factor: [8, 16]
    is_training: True
  loader:
    shuffle: true
    batch_size_per_card: 8
    drop_last: true
    num_workers: 8

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /kaggle/working/ppocr_vnese/data/
    label_file_list:
      - /kaggle/working/ppocr_vnese/data/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode:
          max_text_length: 1000
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          eval_mode: True
          image_shape: [3, 48, 640]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 1
    num_workers: 4
